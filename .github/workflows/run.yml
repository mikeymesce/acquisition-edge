name: Run Acquisition Edge

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: |
          python -m playwright install chromium
          python -m playwright install-deps chromium

      - name: Run license scrape
        run: python main.py --nj-only

      - name: Run enrichment on deceased + retired
        run: python enrich_priority.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          mkdir -p results
          git add -A data/ results/
          git diff --staged --quiet || git commit -m "Update contractor data from cloud run [skip ci]"
          git push

      - name: Re-run if enrichment not complete
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REMAINING=$(python3 -c "
          import sqlite3
          conn = sqlite3.connect('data/contractors.db')
          try:
              count = conn.execute(\"SELECT COUNT(*) FROM contractors WHERE status IN ('Deceased','Retired') AND license_type IN ('Master Plumber','Electrical Contractor') AND (obituary_found IS NULL OR obituary_found = 0)\").fetchone()[0]
          except:
              count = 0
          print(count)
          conn.close()
          ")
          echo "Remaining to enrich: $REMAINING"
          if [ "$REMAINING" -gt 0 ]; then
            echo "Waiting 30 minutes then re-triggering..."
            sleep 1800
            curl -X POST \
              -H "Accept: application/vnd.github.v3+json" \
              -H "Authorization: token $GH_TOKEN" \
              https://api.github.com/repos/mikeymesce/acquisition-edge/actions/workflows/run.yml/dispatches \
              -d '{"ref":"main"}'
            echo "Re-triggered!"
          else
            echo "All done! No re-trigger needed."
          fi
